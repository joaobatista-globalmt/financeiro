# Nginx config for Sistema Financeiro
# Localização: /etc/nginx/snippets/financeiro.conf
# Incluso no vhost principal (192.168.70.45)

location /financeiro/ {
    alias /home/sistema/financeiro/public/;
    index index.php;

    # Negar acesso a arquivos fora de public
    location ~ ^/financeiro/(src|database|docs) {
        deny all;
        return 403;
    }

    # Esconder dotfiles
    location ~ /\. {
        deny all;
    }

    # Enviar para PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_read_timeout 60;
    }
}

# Opcional: servir como raiz alternativa
location = /financeiro {
    return 301 /financeiro/;
}