# PHP-FPM pool config for Sistema Financeiro
# Localização: /etc/php/8.2/fpm/pool.d/financeiro.conf
# (Ou inclua as env vars no www.conf)

[financeiro]
user = sistema
group = sistema
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
listen = /run/php/php8.2-fpm-financeiro.sock

pm = ondemand
pm.max_children = 10
pm.process_idle_timeout = 30s
pm.max_requests = 200

env[DB_FIN_HOST] = 127.0.0.1
env[DB_FIN_PORT] = 3306
env[DB_FIN_DB]   = financeiro
env[DB_FIN_USER] = financeiro_app
env[DB_FIN_PASS] = <ver gerenciador de senhas - NUNCA commitar>

php_admin_value[error_log] = /var/log/php-fpm-financeiro-error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 10M
php_admin_value[post_max_size] = 12M